<!DOCTYPE html>
<html lang="en" class="bg-base-200">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title & logo -->
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/affiliate-marketing.png" type="image/x-icon">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Daisy Ui & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Add CSS -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body >

    <!-- Navbar -->
   <section>
        <div class="navbar bg-base-100 shadow-sm md:px-10">
            <div class="flex flex-1 gap-2 items-center">
                <span class="w-10"><img src="./assets/github-logo.png" alt=""></span>
                <a class="text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search issues" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"> + New Issues</button>
            </div>
        </div>
   </section>
    

   <!-- Label -->
   <section class="w-[80%] mx-auto shadow-sm rounded-sm my-10 space-y-5">

        <!-- label button -->
        <div class="flex gap-4 bg-white p-5 rounded-sm">

            <button class="btn btn-soft btn-primary w-20">All</button>
            <button class="btn btn-soft btn-primary w-20">Open</button>
            <button class="btn btn-soft btn-primary w-20">Close</button>

        </div>

        <!-- label status -->
        <div class="bg-white p-5 rounded-sm">
            <div class="flex gap-4  justify-between">
                
                <div class="flex gap-4 items-center">
                    <span class="p-1 bg-[#ede4f7] rounded-full"><img src="./assets/Aperture.png"></span>
                    <div>
                        <h2 class="font-bold">50 Issues</h2>
                        <p class="text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <div class="p-2 bg-green-600 rounded-full"></div> 
                    <p> Open </p>
                    <div class="p-2 bg-[#A855F7] rounded-full"></div>
                    <p> Close </p>
                </div>
            </div>
        </div>
    
        <!-- load label -->
        <div id="all-btn" class="p-5 rounded-sm grid grid-cols-1 md:grid-cols-4 gap-4">
            
            <div class="card bg-base-100 shadow-md border-t-4 border-green-500">
                <div class="card-body">
                    <div class="flex justify-between items-center">
                        <div class="flex">
                            <img src="./assets/Open-Status.png">
                            <img class="hidden" src="./assets/Closed- Status .png">
                        </div>
                        <div class="px-7 py-2 bg-base-200 rounded-full bg-[#FEECEC] text-[#EF4444] gap-2 flex">HIGH</div>
                    </div>
                    <div class="border-b-2 border-gray-300 space-y-2 py-5">
                        <h2 class="card-title">Card Title</h2>
                        <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>
                        <div class="flex gap-4 flex-wrap">
                            <div class="px-3 py-2 rounded-full border bg-[#FEECEC] text-[#EF4444] gap-2 flex items-center"><span><i class="fa-solid fa-bug"></i></span>Bug</div>
                            <div class="px-3 py-2 rounded-full border bg-[#FFF8DB] text-[#D97706] gap-2 flex items-center"><span><i class="fa-regular fa-life-ring"></i></span>Help WANTED</div>
                            <div class="px-3 py-2 rounded-full border bg-[#cee9d2] text-[#37d906] gap-2 flex items-center"><span><i class="fa-solid fa-star"></i></span>Enhancement</div>
                            <div class="px-3 py-2 rounded-full border bg-[#d5f1ee] text-[#06d9b2] gap-2 flex items-center"><span><i class="fa-solid fa-certificate"></i></span>GOOD FIRST ISSUE</div>
                            <div class="px-3 py-2 rounded-full border bg-[#f0def1] text-[#d906d9] gap-2 flex items-center"><span><i class="fa-brands fa-files-pinwheel"></i></span>DOCUMENTATION</div>
                        </div>
                    </div>
                    <div class="space-y-3 pt-4">
                        <p class="text-[#64748B]">#1 by john_doe</p>
                        <p class="text-[#64748B]">1/15/2024</p>
                    </div>
                </div>
                
            </div>

        </div>
   </section>
   

    <script src="./script/tamplate.js"></script>
    <script src="./script/scriptHome.js"></script>
</body>

</html>
