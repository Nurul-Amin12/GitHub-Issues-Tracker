<!DOCTYPE html>
<html lang="en" class="bg-base-200">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title & logo -->
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/affiliate-marketing.png" type="image/x-icon">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Daisy Ui & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Add CSS -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body >

    <!-- Navbar -->
   <section>
        <div class="navbar bg-base-100 shadow-sm md:px-10">
            <div class="flex flex-1 gap-2 items-center">
                <span class="w-10"><img src="./assets/github-logo.png"></span>
                <a class="text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search issues" class="input input-bordered w-24 md:w-auto"/>
                <button id="search-btn" class="btn btn-primary"> + New Issues</button>
            </div>
        </div>
   </section>
    

   <!-- Label -->
   <section class="w-[80%] mx-auto shadow-sm rounded-sm my-10 space-y-5">

        <!-- label button -->
        <div class="flex gap-4 bg-white p-5 rounded-sm">

            <button id="label-all" class="btn btn-soft btn-primary w-20">All</button>
            <button id="label-open" class="btn btn-soft btn-primary w-20">Open</button>
            <button id="label-close" class="btn btn-soft btn-primary w-20">Close</button>

        </div>

        <!-- label status -->
        <div class="bg-white p-5 rounded-sm">
            <div class="flex gap-4  justify-between">
                
                <div class="flex gap-4 items-center">
                    <span class="p-1 bg-[#ede4f7] rounded-full"><img src="./assets/Aperture.png"></span>
                    <div>
                        <h2 class="font-bold"><span id="total-issues"></span> Issues</h2>
                        <p class="text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <div class="p-2 bg-green-600 rounded-full"></div> 
                    <p> Open </p>
                    <div class="p-2 bg-[#A855F7] rounded-full"></div>
                    <p> Close </p>
                </div>
            </div>
        </div>

        <!-- spinner -->
         <div id="spinner" class="flex justify-center items-center my-25 hidden">
            <span class="loading loading-spinner loading-xl"></span>
         </div>
    
        <!-- load label -->
        <div id="all-btn" class="p-5 rounded-sm grid grid-cols-1 md:grid-cols-4 gap-4">
            
        </div>

        <!-- load unavailable for search -->
        <div id="search-unavailable" class="p-5 rounded-sm hidden">
            
            <h2 class="text-center font-bold text-5xl text-red-500"> No Issue Available For Your Search!! </h2>
            <h2 class="text-center font-bold text-2xl text-gray-300 my-7"> Try Again... </h2>

        </div>


        <!-- load Modal -->
         <!-- Open the modal using ID.showModal() method -->
        <dialog id="card_details" class="modal modal-bottom sm:modal-middle shadow-sm">
            <div id="card-container" class="modal-box">
                
            </div>
        </dialog>

   </section>

    <script src="./script/tamplate.js"></script>
    <script src="./script/scriptHome.js"></script>
</body>

</html>
